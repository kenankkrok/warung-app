<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warung Nusantara</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h2>🍳 Warung Nusantara</h2>
  <div class="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<section class="menu">

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?fried-rice">
    <h3>Nasi Goreng</h3>
    <p>Rp 20.000</p>
    <button onclick="addToCart('Nasi Goreng',20000)">Tambah</button>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?chicken-food">
    <h3>Ayam Penyet</h3>
    <p>Rp 22.000</p>
    <button onclick="addToCart('Ayam Penyet',22000)">Tambah</button>
  </div>

</section>

<!-- CART PANEL -->
<div class="cart-panel" id="cart-panel">
  <h3>Keranjang</h3>
  <div id="cart-items"></div>
  <h4>Total: Rp <span id="total">0</span></h4>
  <button onclick="checkout()">Checkout</button>
</div>

<script src="app.js"></script>
</body>
</html>
