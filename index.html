<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warung Nusantara</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h2>🍳 Warung Nusantara</h2>
</header>

<section class="hero">
  <h1>Masakan Rumahan</h1>
  <p>Enak, Murah, Cepat</p>
</section>

<section class="menu">

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?fried-rice">
    <h3>Nasi Goreng</h3>
    <p>Rp 20.000</p>
    <button onclick="order('Nasi Goreng')">Pesan</button>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?chicken-food">
    <h3>Ayam Penyet</h3>
    <p>Rp 22.000</p>
    <button onclick="order('Ayam Penyet')">Pesan</button>
  </div>

</section>

<script>
function order(menu){
  window.open("https://wa.me/628123456789?text=Pesan " + menu);
}
</script>

</body>
</html>
