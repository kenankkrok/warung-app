<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui;
}

body {
  background: #f5f5f5;
}

/* HEADER */
.header {
  background: #ff5e00;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  position: sticky;
  top: 0;
}

.cart-icon {
  position: absolute;
  right: 15px;
  top: 15px;
  cursor: pointer;
}

/* MENU */
.menu {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card h3 {
  margin: 10px;
}

.card p {
  margin: 0 10px;
  color: #666;
}

.card button {
  margin: 10px;
  width: calc(100% - 20px);
  padding: 12px;
  border: none;
  background: linear-gradient(135deg, #ff5e00, #ff7a00);
  color: white;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

/* CART PANEL */
.cart-panel {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  background: white;
  padding: 20px;
  border-radius: 20px 20px 0 0;
  transition: 0.3s;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
}

.cart-panel.active {
  bottom: 0;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

/* BUTTON */
.checkout {
  width: 100%;
  padding: 12px;
  border: none;
  background: #ff5e00;
  color: white;
  border-radius: 10px;
  margin-top: 10px;
}

/* RESPONSIVE */
@media (min-width: 600px) {
  .menu {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>

<body>

<header class="header">
  🍳 Warung Nusantara
  <span class="cart-icon" onclick="toggleCart()">🛒 <span id="count">0</span></span>
</header>

<section class="menu">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908554165-e3b5f5c6f8e2?w=400">
    <h3>Nasi Goreng</h3>
    <p>Rp 20.000</p>
    <button onclick="addToCart('Nasi Goreng',20000)">Tambah</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908176997-431b6c64f0b4?w=400">
    <h3>Ayam Penyet</h3>
    <p>Rp 22.000</p>
    <button onclick="addToCart('Ayam Penyet',22000)">Tambah</button>
  </div>

</section>

<!-- CART -->
<div class="cart-panel" id="cart">
  <h3>Keranjang</h3>
  <div id="items"></div>
  <h4>Total: Rp <span id="total">0</span></h4>
  <button class="checkout" onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({ name, price });
  updateCart();
}

function updateCart() {
  document.getElementById("count").innerText = cart.length;

  let html = "";
  let total = 0;

  cart.forEach(item => {
    html += `
      <div class="cart-item">
        <span>${item.name}</span>
        <span>Rp ${item.price}</span>
      </div>
    `;
    total += item.price;
  });

  document.getElementById("items").innerHTML = html;
  document.getElementById("total").innerText = total;
}

function toggleCart() {
  document.getElementById("cart").classList.toggle("active");
}

function checkout() {
  let text = "Pesanan saya:%0A";

  cart.forEach(item => {
    text += `- ${item.name} (Rp ${item.price})%0A`;
  });

  let total = cart.reduce((sum, i) => sum + i.price, 0);
  text += `%0ATotal: Rp ${total}`;

  window.open("https://wa.me/628123456789?text=" + text);
}
</script>

</body>
</html>
