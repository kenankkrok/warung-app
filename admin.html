<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Admin Dasbor - Warung Nusantara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-md flex flex-col">
        <div class="p-6 border-b border-gray-100 flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-600">
                <i class="fa-solid fa-utensils"></i>
            </div>
            <h1 class="font-bold text-lg text-gray-800">Admin Panel</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="flex items-center gap-3 text-orange-600 bg-orange-50 px-4 py-3 rounded-xl font-medium transition">
                <i class="fa-solid fa-box"></i> Kelola Produk
            </a>
            </nav>
        <div class="p-4 border-t border-gray-100">
            <a href="index.html" class="flex items-center gap-3 text-gray-500 hover:text-red-500 px-4 py-2 font-medium transition">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Keluar
            </a>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        <header class="mb-8">
            <h2 class="text-2xl font-bold text-gray-800">Kelola Menu Makanan</h2>
            <p class="text-gray-500 text-sm">Tambahkan produk baru dengan foto langsung ke database.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="bg-white rounded-2xl shadow-sm p-6 col-span-1 h-fit">
                <h3 class="font-semibold text-lg mb-4 border-b pb-2">Tambah Menu Baru</h3>
                <form id="form-product" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nama Menu</label>
                        <input type="text" id="p-name" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-orange-500 outline-none">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Harga (Rp)</label>
                            <input type="number" id="p-price" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-orange-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Kategori</label>
                            <select id="p-category" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-orange-500 outline-none">
                                <option value="nasi">Nasi</option>
                                <option value="ayam">Ayam</option>
                                <option value="sayur">Sayur</option>
                                <option value="minuman">Minuman</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Foto Menu (Upload)</label>
                        <input type="file" id="p-image" accept="image/*" required class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100 cursor-pointer border border-gray-300 rounded-lg p-1">
                        <p class="text-[10px] text-gray-400 mt-1">*Foto akan otomatis diupload ke Google Drive</p>
                    </div>

                    <button type="submit" id="btn-submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-medium py-3 rounded-xl transition flex justify-center items-center gap-2 mt-4">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Simpan Produk
                    </button>
                </form>
            </div>

            <div class="bg-white rounded-2xl shadow-sm p-6 col-span-1 lg:col-span-2">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-semibold text-lg">Daftar Menu Aktif</h3>
                    <button onclick="loadAdminProducts()" class="text-gray-500 hover:text-orange-600 transition"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm">
                                <th class="p-3 rounded-tl-lg">Foto</th>
                                <th class="p-3">Nama Menu</th>
                                <th class="p-3">Kategori</th>
                                <th class="p-3">Harga</th>
                                <th class="p-3 rounded-tr-lg">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="text-sm">
                            <tr><td colspan="5" class="text-center p-4 text-gray-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        // ==========================================
        // KONFIGURASI API (WAJIB DIISI)
        // ==========================================
        const API_BASE_URL = "https://warung-api.kenankkrok.workers.dev"; // Contoh: https://warung-api.anda.workers.dev
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzfWJO8XiANrJnOr-UgMoirc1RM96MLaieUmyS8H3DVNa279KmPQjeS15rAnhJCDbNN/exec"; // Contoh: https://script.google.com/macros/s/.../exec

        // ==========================================
        // 1. TAMPILKAN DAFTAR PRODUK
        // ==========================================
        async function loadAdminProducts() {
            const tbody = document.getElementById('table-body');
            try {
                const response = await fetch(`${API_BASE_URL}/api/menu`);
                const products = await response.json();
                
                tbody.innerHTML = '';
                if(products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4 text-gray-500">Belum ada menu.</td></tr>';
                    return;
                }

                products.forEach(p => {
                    const priceIDR = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(p.price);
                    tbody.innerHTML += `
                        <tr class="border-b border-gray-50 hover:bg-gray-50">
                            <td class="p-3"><img src="${p.image}" class="w-12 h-12 rounded object-cover"></td>
                            <td class="p-3 font-medium">${p.name}</td>
                            <td class="p-3 capitalize">${p.category}</td>
                            <td class="p-3 text-orange-600 font-semibold">${priceIDR}</td>
                            <td class="p-3">
                                <button class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4 text-red-500">Gagal memuat database.</td></tr>';
            }
        }

        // ==========================================
        // 2. LOGIKA UPLOAD GAMBAR & SIMPAN DATA
        // ==========================================
        document.getElementById('form-product').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btn-submit');
            const fileInput = document.getElementById('p-image').files[0];
            
            // Ambil data inputan
            const productData = {
                name: document.getElementById('p-name').value,
                price: parseInt(document.getElementById('p-price').value),
                category: document.getElementById('p-category').value,
                image: "" // Akan diisi setelah upload ke Drive
            };

            if (!fileInput) return alert("Pilih foto dulu!");

            // Ubah tombol jadi loading
            btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Mengupload Foto...';
            btnSubmit.disabled = true;

            try {
                // PROSES A: Convert Gambar ke Base64
                const reader = new FileReader();
                reader.onload = async function() {
                    const base64Data = reader.result.split(',')[1];
                    
                    // PROSES B: Kirim ke Google Apps Script (Drive)
                    const gasResponse = await fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            filename: fileInput.name,
                            mimeType: fileInput.type,
                            base64: base64Data
                        })
                    });
                    
                    const gasResult = await gasResponse.json();
                    
                    if(gasResult.status !== 'success') {
                        throw new Error("Gagal upload ke Drive");
                    }

                    // PROSES C: Masukkan link gambar dari Drive ke data produk
                    productData.image = gasResult.url;
                    btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan Database...';

                    // PROSES D: Kirim Data Lengkap ke Cloudflare Worker API
                    const apiResponse = await fetch(`${API_BASE_URL}/api/product`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(productData)
                    });

                    if(apiResponse.ok) {
                        alert("Produk berhasil ditambahkan!");
                        document.getElementById('form-product').reset(); // Kosongkan form
                        loadAdminProducts(); // Refresh tabel
                    } else {
                        throw new Error("Gagal simpan ke database");
                    }

                    // Kembalikan tombol
                    btnSubmit.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Simpan Produk';
                    btnSubmit.disabled = false;
                };
                
                reader.readAsDataURL(fileInput); // Memulai konversi file

            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan sistem!");
                btnSubmit.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Simpan Produk';
                btnSubmit.disabled = false;
            }
        });

        // Load tabel saat halaman pertama dibuka
        document.addEventListener('DOMContentLoaded', loadAdminProducts);
    </script>
</body>
</html>
