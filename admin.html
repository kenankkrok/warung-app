<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Admin Dasbor - Warung Nusantara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-md flex flex-col hidden md:flex z-10">
        <div class="p-6 border-b border-gray-100 flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-600">
                <i class="fa-solid fa-utensils"></i>
            </div>
            <h1 class="font-bold text-lg text-gray-800">Admin Panel</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchTab('orders')" id="nav-orders" class="w-full flex items-center gap-3 text-gray-600 hover:bg-orange-50 hover:text-orange-600 px-4 py-3 rounded-xl font-medium transition">
                <i class="fa-solid fa-bell-concierge"></i> Pesanan Masuk
            </button>
            <button onclick="switchTab('products')" id="nav-products" class="w-full flex items-center gap-3 text-orange-600 bg-orange-50 px-4 py-3 rounded-xl font-medium transition">
                <i class="fa-solid fa-box"></i> Kelola Produk
            </button>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <a href="index.html" class="flex items-center gap-3 text-gray-500 hover:text-red-500 px-4 py-2 font-medium transition">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Buka Toko
            </a>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 relative">
        
        <div id="view-products" class="block">
            <header class="mb-8">
                <h2 class="text-2xl font-bold text-gray-800">Kelola Menu Makanan</h2>
                <p class="text-gray-500 text-sm">Tambahkan, edit, atau hapus menu.</p>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-white rounded-2xl shadow-sm p-6 col-span-1 h-fit" id="form-container">
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <h3 id="form-title" class="font-semibold text-lg text-orange-600">Tambah Menu Baru</h3>
                        <button id="btn-cancel" onclick="cancelEdit()" class="hidden text-xs bg-gray-100 text-gray-600 px-3 py-1 rounded hover:bg-gray-200 transition">Batal Edit</button>
                    </div>
                    
                    <form id="form-product" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Menu</label>
                            <input type="text" id="p-name" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-orange-500 outline-none">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Harga (Rp)</label>
                                <input type="number" id="p-price" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-orange-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Kategori</label>
                                <select id="p-category" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-orange-500 outline-none">
                                    <option value="nasi">Nasi</option>
                                    <option value="ayam">Ayam</option>
                                    <option value="sayur">Sayur</option>
                                    <option value="minuman">Minuman</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Foto Menu</label>
                            <input type="file" id="p-image" accept="image/*" required class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100 cursor-pointer border border-gray-300 rounded-lg p-1">
                            <p id="image-help-text" class="text-[10px] text-gray-400 mt-1">*Pilih foto untuk diupload ke Google Drive</p>
                        </div>

                        <button type="submit" id="btn-submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-medium py-3 rounded-xl transition flex justify-center items-center gap-2 mt-4">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Simpan Produk
                        </button>
                    </form>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-6 col-span-1 lg:col-span-2 overflow-hidden">
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <h3 class="font-semibold text-lg">Daftar Menu Aktif</h3>
                        <button onclick="loadAdminProducts()" class="text-gray-500 hover:text-orange-600 transition"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-600 text-sm border-b">
                                    <th class="p-3">Foto</th><th class="p-3">Nama Menu</th><th class="p-3">Kategori</th><th class="p-3">Harga</th><th class="p-3 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="table-body" class="text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-orders" class="hidden">
            <header class="mb-8 flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Pesanan Masuk</h2>
                    <p class="text-gray-500 text-sm">Daftar pesanan pelanggan yang belum diselesaikan.</p>
                </div>
                <button onclick="loadOrders()" class="bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg hover:bg-gray-50 transition">
                    <i class="fa-solid fa-rotate-right mr-2"></i>Muat Ulang
                </button>
            </header>

            <div id="orders-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                </div>
        </div>

    </main>

    <script>
        // ==========================================
        // 1. KONFIGURASI API (WAJIB DIISI)
        // ==========================================
        const API_BASE_URL = "https://warung-api.kenankkrok.workers.dev"; 
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzfWJO8XiANrJnOr-UgMoirc1RM96MLaieUmyS8H3DVNa279KmPQjeS15rAnhJCDbNN/exec"; 

        // State Global
        let allProducts = [];
        let editingId = null;
        let currentImageUrl = "";

        const formatRupiah = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);

        // ==========================================
        // 2. SISTEM NAVIGASI TAB
        // ==========================================
        function switchTab(tabName) {
            // Sembunyikan semua view
            document.getElementById('view-products').classList.add('hidden');
            document.getElementById('view-orders').classList.add('hidden');
            
            // Reset gaya tombol navigasi
            document.getElementById('nav-products').className = "w-full flex items-center gap-3 text-gray-600 hover:bg-orange-50 hover:text-orange-600 px-4 py-3 rounded-xl font-medium transition";
            document.getElementById('nav-orders').className = "w-full flex items-center gap-3 text-gray-600 hover:bg-orange-50 hover:text-orange-600 px-4 py-3 rounded-xl font-medium transition";

            // Tampilkan view yang dipilih
            document.getElementById(`view-${tabName}`).classList.remove('hidden');
            document.getElementById(`nav-${tabName}`).className = "w-full flex items-center gap-3 text-orange-600 bg-orange-50 px-4 py-3 rounded-xl font-medium transition";

            // Muat data sesuai tab
            if(tabName === 'products') loadAdminProducts();
            if(tabName === 'orders') loadOrders();
        }

        // ==========================================
        // 3. FITUR PESANAN MASUK
        // ==========================================
        async function loadOrders() {
            const container = document.getElementById('orders-container');
            container.innerHTML = '<div class="col-span-full text-center py-10 text-gray-500"><i class="fa-solid fa-spinner fa-spin text-2xl mb-3"></i><br>Mencari pesanan baru...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/api/orders`);
                const orders = await response.json();

                container.innerHTML = '';

                if (orders.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full bg-white rounded-2xl p-10 text-center border border-dashed border-gray-300">
                            <i class="fa-regular fa-face-smile-wink text-4xl text-gray-300 mb-3"></i>
                            <h3 class="font-bold text-gray-600">Belum ada pesanan masuk</h3>
                            <p class="text-sm text-gray-400">Silakan tunggu pelanggan memesan makanan.</p>
                        </div>`;
                    return;
                }

                orders.forEach(order => {
                    // Buat list HTML untuk item yang dipesan
                    let itemsHtml = order.items.map(item => `
                        <div class="flex justify-between text-sm text-gray-600 border-b border-gray-50 py-2">
                            <span>${item.quantity}x ${item.product_name}</span>
                            <span class="font-medium">${formatRupiah(item.subtotal)}</span>
                        </div>
                    `).join('');

                    // Potong UUID pesanan agar lebih pendek untuk ditampilkan
                    const shortOrderId = order.id.split('-')[0].toUpperCase();
                    
                    // Format Waktu
                    const time = new Date(order.created_at).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                    container.innerHTML += `
                        <div class="bg-white rounded-2xl p-6 shadow-sm border-t-4 border-orange-500 flex flex-col">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-bold text-lg text-gray-800">${order.customer_name}</h3>
                                    <p class="text-xs text-gray-400">Order: #${shortOrderId} • Jam: ${time}</p>
                                </div>
                                <span class="bg-yellow-100 text-yellow-700 text-xs px-2 py-1 rounded font-medium animate-pulse">
                                    Memasak
                                </span>
                            </div>
                            
                            <div class="flex-1 bg-gray-50 rounded-xl p-4 mb-4">
                                ${itemsHtml}
                            </div>

                            <div class="flex justify-between items-center mb-4 px-1">
                                <span class="text-sm text-gray-500">Total Harga</span>
                                <span class="font-bold text-orange-600 text-xl">${formatRupiah(order.total_price)}</span>
                            </div>

                            <button onclick="completeOrder('${order.id}')" class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl font-medium transition flex justify-center items-center gap-2">
                                <i class="fa-solid fa-check-double"></i> Tandai Selesai
                            </button>
                        </div>
                    `;
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="col-span-full text-center py-10 text-red-500">Gagal terhubung ke database.</div>';
            }
        }

        // Fungsi menandai pesanan selesai
        window.completeOrder = async function(orderId) {
            if (!confirm("Apakah makanan sudah selesai dibuat dan diserahkan ke pelanggan?")) return;

            try {
                const response = await fetch(`${API_BASE_URL}/api/orders/${orderId}`, { method: 'PUT' });
                if (response.ok) {
                    loadOrders(); // Refresh otomatis jika berhasil
                } else {
                    alert("Gagal menyelesaikan pesanan.");
                }
            } catch (error) {
                console.error(error);
                alert("Kesalahan jaringan.");
            }
        }

        // ==========================================
        // 4. FITUR KELOLA PRODUK (Sama seperti sebelumnya)
        // ==========================================
        async function loadAdminProducts() {
            const tbody = document.getElementById('table-body');
            try {
                const response = await fetch(`${API_BASE_URL}/api/menu`);
                allProducts = await response.json();
                
                tbody.innerHTML = '';
                if(allProducts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4 text-gray-500">Belum ada menu.</td></tr>';
                    return;
                }

                allProducts.forEach(p => {
                    tbody.innerHTML += `
                        <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
                            <td class="p-3"><img src="${p.image}" class="w-12 h-12 rounded-lg object-cover shadow-sm"></td>
                            <td class="p-3 font-medium text-gray-800">${p.name}</td>
                            <td class="p-3 capitalize text-gray-500">${p.category}</td>
                            <td class="p-3 text-orange-600 font-semibold">${formatRupiah(p.price)}</td>
                            <td class="p-3 text-center">
                                <div class="flex justify-center gap-2">
                                    <button onclick="editProduct(${p.id})" class="text-blue-500 hover:text-blue-700 bg-blue-50 w-8 h-8 rounded transition flex items-center justify-center"><i class="fa-solid fa-pen"></i></button>
                                    <button onclick="deleteProduct(${p.id})" class="text-red-500 hover:text-red-700 bg-red-50 w-8 h-8 rounded transition flex items-center justify-center"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4 text-red-500">Gagal memuat database.</td></tr>';
            }
        }

        window.editProduct = function(id) {
            const product = allProducts.find(p => p.id === id);
            if(!product) return;
            editingId = id; currentImageUrl = product.image;
            document.getElementById('p-name').value = product.name; document.getElementById('p-price').value = product.price; document.getElementById('p-category').value = product.category;
            document.getElementById('p-image').required = false; document.getElementById('image-help-text').innerText = "*Kosongkan jika tidak ingin mengubah foto.";
            document.getElementById('form-title').innerText = "Edit Menu"; document.getElementById('form-title').classList.replace('text-orange-600', 'text-blue-600');
            document.getElementById('btn-submit').innerHTML = '<i class="fa-solid fa-check"></i> Update Produk'; document.getElementById('btn-cancel').classList.remove('hidden');
        };

        window.cancelEdit = function() {
            editingId = null; currentImageUrl = ""; document.getElementById('form-product').reset();
            document.getElementById('p-image').required = true; document.getElementById('image-help-text').innerText = "*Pilih foto untuk diupload ke Google Drive";
            document.getElementById('form-title').innerText = "Tambah Menu Baru"; document.getElementById('form-title').classList.replace('text-blue-600', 'text-orange-600');
            document.getElementById('btn-submit').innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Simpan Produk'; document.getElementById('btn-cancel').classList.add('hidden');
        };

        window.deleteProduct = async function(id) {
            if (!confirm("Hapus menu ini?")) return;
            try {
                const res = await fetch(`${API_BASE_URL}/api/product/${id}`, { method: 'DELETE' });
                if (res.ok) loadAdminProducts(); else alert("Gagal menghapus.");
            } catch (e) { alert("Terjadi kesalahan."); }
        };

        document.getElementById('form-product').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btn-submit'); const fileInput = document.getElementById('p-image').files[0];
            const productData = { name: document.getElementById('p-name').value, price: parseInt(document.getElementById('p-price').value), category: document.getElementById('p-category').value, image: currentImageUrl };
            const method = editingId ? 'PUT' : 'POST'; const endpoint = editingId ? `/api/product/${editingId}` : `/api/product`;
            btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...'; btnSubmit.disabled = true;

            try {
                if (fileInput) {
                    btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Upload Drive...';
                    const base64Data = await new Promise((res) => { const reader = new FileReader(); reader.onload = () => res(reader.result.split(',')[1]); reader.readAsDataURL(fileInput); });
                    const gasRes = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ filename: fileInput.name, mimeType: fileInput.type, base64: base64Data }) });
                    const gasResult = await gasRes.json();
                    if(gasResult.status !== 'success') throw new Error("Gagal upload Drive");
                    productData.image = gasResult.url;
                }
                btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Simpan Database...';
                const apiRes = await fetch(`${API_BASE_URL}${endpoint}`, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(productData) });
                if(apiRes.ok) { cancelEdit(); loadAdminProducts(); } else throw new Error("Gagal database");
            } catch (error) {
                alert("Error: " + error.message); btnSubmit.innerHTML = editingId ? 'Update Produk' : 'Simpan Produk';
            } finally { btnSubmit.disabled = false; }
        });

        // ==========================================
        // 5. Inisialisasi Saat Buka Halaman
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            // Default buka tab Pesanan Masuk
            switchTab('orders');
        });
    </script>
</body>
</html>
